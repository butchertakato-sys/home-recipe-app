<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>家庭用レシピ保存</title>
  <style>
    :root {
      --bg: #f7f5ef;
      --surface: #fffdfa;
      --surface-strong: #ffffff;
      --text: #24211d;
      --muted: #706b62;
      --line: #ded7cb;
      --primary: #25635a;
      --primary-dark: #174b44;
      --accent: #c8553d;
      --soft: #e8f0eb;
      --danger: #b3261e;
      --shadow: 0 10px 28px rgba(47, 39, 27, 0.08);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .app-shell {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 18px 14px 32px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.45rem;
      letter-spacing: 0;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .home-controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-wrap input {
      padding-left: 40px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-strong);
      color: var(--text);
      padding: 11px 12px;
      outline: none;
    }

    textarea {
      min-height: 118px;
      resize: vertical;
      line-height: 1.55;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 90, 0.13);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 42px;
      border-radius: 8px;
      padding: 9px 13px;
      background: var(--primary);
      color: white;
      font-weight: 700;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .btn.secondary {
      background: var(--soft);
      color: var(--primary-dark);
    }

    .btn.secondary:hover {
      background: #dce9e2;
    }

    .btn.ghost {
      background: transparent;
      color: var(--primary-dark);
      border: 1px solid var(--line);
    }

    .btn.danger {
      background: #f7e4e1;
      color: var(--danger);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      padding: 0;
      border-radius: 8px;
    }

    .recipe-list {
      display: grid;
      gap: 10px;
    }

    .recipe-card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-strong);
      padding: 13px;
      color: inherit;
    }

    .recipe-card:hover {
      border-color: var(--primary);
    }

    .recipe-card h2 {
      margin: 0 0 7px;
      font-size: 1rem;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .recipe-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      background: #f1eee7;
      padding: 4px 9px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 34px 16px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 250, 0.68);
    }

    .screen-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .screen-head h2 {
      margin: 0;
      font-size: 1.22rem;
      letter-spacing: 0;
    }

    .upload-box {
      border: 1px dashed var(--primary);
      border-radius: 8px;
      background: #f6fbf8;
      padding: 16px;
      display: grid;
      gap: 11px;
      margin-bottom: 14px;
    }

    .file-input {
      display: grid;
      gap: 8px;
    }

    .file-note,
    .ocr-status {
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .ocr-status strong {
      color: var(--primary-dark);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 9px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .detail-title {
      margin: 0 0 8px;
      font-size: 1.45rem;
      overflow-wrap: anywhere;
      letter-spacing: 0;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .detail-section {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      min-width: 0;
    }

    .detail-section.full {
      grid-column: 1 / -1;
    }

    .detail-section h3 {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 0.86rem;
      letter-spacing: 0;
    }

    .detail-section p {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.65;
      overflow-wrap: anywhere;
    }

    .raw-preview {
      max-height: 190px;
      overflow: auto;
      background: #27231f;
      color: #fffaf1;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.86rem;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: #24211d;
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      font-size: 0.88rem;
      z-index: 5;
    }

    .toast.show {
      opacity: 1;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 680px) {
      .app-shell {
        padding: 14px 10px 90px;
      }

      .topbar,
      .home-controls,
      .screen-head {
        align-items: stretch;
      }

      .topbar {
        flex-direction: column;
      }

      .home-controls {
        grid-template-columns: 1fr;
      }

      .toolbar,
      .screen-head {
        justify-content: space-between;
      }

      .form-grid,
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }

      .toolbar .btn,
      .screen-head .btn,
      .form-actions .btn {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1>家庭用レシピ保存</h1>
        <p>画像は保存せず、OCRで読み取ったテキストだけを残します。</p>
      </div>
      <div class="toolbar">
        <button class="btn secondary" id="homeButton" type="button" title="ホームへ戻る">
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>
          ホーム
        </button>
      </div>
    </header>

    <section class="view active" id="homeView">
      <div class="home-controls">
        <div class="search-wrap">
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" type="search" placeholder="タイトル・材料・メモで検索">
        </div>
        <button class="btn" id="newRecipeButton" type="button">
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          新規追加
        </button>
      </div>
      <div class="recipe-list" id="recipeList"></div>
    </section>

    <section class="view" id="editView">
      <div class="screen-head">
        <h2 id="editHeading">新規追加</h2>
        <button class="btn ghost" id="backFromEditButton" type="button">
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          戻る
        </button>
      </div>

      <div class="upload-box" id="uploadBox">
        <div class="file-input">
          <label for="imageInput">レシピ画像</label>
          <input id="imageInput" type="file" accept="image/*">
        </div>
        <button class="btn secondary" id="ocrButton" type="button" disabled>
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 7h10"/><path d="M7 12h10"/><path d="M7 17h6"/></svg>
          OCR実行
        </button>
        <div class="file-note">保存されるのは下の編集欄の内容だけです。画像ファイル名や画像データは保存しません。</div>
        <div class="ocr-status" id="ocrStatus"></div>
        <div class="raw-preview hidden" id="rawPreview"></div>
      </div>

      <form class="panel" id="recipeForm">
        <div class="form-grid">
          <div class="field full">
            <label for="titleInput">タイトル</label>
            <input id="titleInput" required placeholder="例：鶏むね肉の照り焼き">
          </div>
          <div class="field">
            <label for="categoryInput">カテゴリ</label>
            <select id="categoryInput">
              <option value="主菜">主菜</option>
              <option value="副菜">副菜</option>
              <option value="汁物">汁物</option>
              <option value="ご飯・麺">ご飯・麺</option>
              <option value="お弁当">お弁当</option>
              <option value="お菓子">お菓子</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="field">
            <label for="timeInput">調理時間</label>
            <input id="timeInput" placeholder="例：20分">
          </div>
          <div class="field">
            <label for="servingsInput">分量</label>
            <input id="servingsInput" placeholder="例：2人分">
          </div>
          <div class="field full">
            <label for="ingredientsInput">材料</label>
            <textarea id="ingredientsInput" placeholder="材料を1行ずつ入力"></textarea>
          </div>
          <div class="field full">
            <label for="stepsInput">作り方</label>
            <textarea id="stepsInput" placeholder="手順を入力"></textarea>
          </div>
          <div class="field full">
            <label for="memoInput">メモ</label>
            <textarea id="memoInput" placeholder="OCRの気になる箇所、味の調整、家族の好みなど"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn ghost" id="cancelEditButton" type="button">キャンセル</button>
          <button class="btn" type="submit">
            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
            保存
          </button>
        </div>
      </form>
    </section>

    <section class="view" id="detailView">
      <div class="screen-head">
        <h2>レシピ詳細</h2>
        <button class="btn ghost" id="backFromDetailButton" type="button">
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          戻る
        </button>
      </div>
      <article class="panel" id="detailContent"></article>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const STORAGE_KEY = "home-recipe-text-only-v1";
    const views = {
      home: document.getElementById("homeView"),
      edit: document.getElementById("editView"),
      detail: document.getElementById("detailView")
    };

    const recipeList = document.getElementById("recipeList");
    const searchInput = document.getElementById("searchInput");
    const form = document.getElementById("recipeForm");
    const uploadBox = document.getElementById("uploadBox");
    const imageInput = document.getElementById("imageInput");
    const ocrButton = document.getElementById("ocrButton");
    const ocrStatus = document.getElementById("ocrStatus");
    const rawPreview = document.getElementById("rawPreview");
    const editHeading = document.getElementById("editHeading");
    const detailContent = document.getElementById("detailContent");
    const toast = document.getElementById("toast");

    const fields = {
      title: document.getElementById("titleInput"),
      category: document.getElementById("categoryInput"),
      ingredients: document.getElementById("ingredientsInput"),
      steps: document.getElementById("stepsInput"),
      time: document.getElementById("timeInput"),
      servings: document.getElementById("servingsInput"),
      memo: document.getElementById("memoInput")
    };

    let recipes = loadRecipes();
    let editingId = null;
    let currentDetailId = null;
    let selectedImageFile = null;

    function loadRecipes() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveRecipes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes));
    }

    function showView(name) {
      Object.values(views).forEach((view) => view.classList.remove("active"));
      views[name].classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function todayIso() {
      return new Date().toISOString();
    }

    function formatDate(value) {
      if (!value) return "";
      return new Intl.DateTimeFormat("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(new Date(value));
    }

    function normalizeText(value) {
      return (value || "").replace(/\r\n/g, "\n").trim();
    }

    function renderHome() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = recipes
        .filter((recipe) => {
          const haystack = [
            recipe.title,
            recipe.category,
            recipe.ingredients,
            recipe.steps,
            recipe.memo
          ].join(" ").toLowerCase();
          return haystack.includes(query);
        })
        .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

      if (!filtered.length) {
        recipeList.innerHTML = `<div class="empty">${recipes.length ? "該当するレシピがありません。" : "まだレシピがありません。新規追加からOCRで登録できます。"}</div>`;
        return;
      }

      recipeList.innerHTML = filtered.map((recipe) => `
        <button class="recipe-card" type="button" data-id="${recipe.id}">
          <h2>${escapeHtml(recipe.title || "無題のレシピ")}</h2>
          <div class="recipe-meta">
            <span class="tag">${escapeHtml(recipe.category || "未分類")}</span>
            ${recipe.time ? `<span class="tag">${escapeHtml(recipe.time)}</span>` : ""}
            ${recipe.servings ? `<span class="tag">${escapeHtml(recipe.servings)}</span>` : ""}
            <span class="tag">更新 ${formatDate(recipe.updatedAt)}</span>
          </div>
        </button>
      `).join("");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function openNewRecipe() {
      editingId = null;
      editHeading.textContent = "新規追加";
      uploadBox.classList.remove("hidden");
      form.reset();
      fields.category.value = "主菜";
      selectedImageFile = null;
      imageInput.value = "";
      ocrButton.disabled = true;
      ocrStatus.textContent = "";
      rawPreview.classList.add("hidden");
      rawPreview.textContent = "";
      showView("edit");
    }

    function openEditRecipe(id) {
      const recipe = recipes.find((item) => item.id === id);
      if (!recipe) return;
      editingId = id;
      editHeading.textContent = "レシピ編集";
      uploadBox.classList.add("hidden");
      fields.title.value = recipe.title || "";
      fields.category.value = recipe.category || "その他";
      fields.ingredients.value = recipe.ingredients || "";
      fields.steps.value = recipe.steps || "";
      fields.time.value = recipe.time || "";
      fields.servings.value = recipe.servings || "";
      fields.memo.value = recipe.memo || "";
      showView("edit");
    }

    function openDetail(id) {
      const recipe = recipes.find((item) => item.id === id);
      if (!recipe) return;
      currentDetailId = id;
      detailContent.innerHTML = `
        <h1 class="detail-title">${escapeHtml(recipe.title || "無題のレシピ")}</h1>
        <div class="recipe-meta">
          <span class="tag">${escapeHtml(recipe.category || "未分類")}</span>
          ${recipe.time ? `<span class="tag">${escapeHtml(recipe.time)}</span>` : ""}
          ${recipe.servings ? `<span class="tag">${escapeHtml(recipe.servings)}</span>` : ""}
          <span class="tag">作成 ${formatDate(recipe.createdAt)}</span>
          <span class="tag">更新 ${formatDate(recipe.updatedAt)}</span>
        </div>
        <div class="detail-grid">
          <section class="detail-section full">
            <h3>材料</h3>
            <p>${escapeHtml(recipe.ingredients || "未入力")}</p>
          </section>
          <section class="detail-section full">
            <h3>作り方</h3>
            <p>${escapeHtml(recipe.steps || "未入力")}</p>
          </section>
          <section class="detail-section">
            <h3>調理時間</h3>
            <p>${escapeHtml(recipe.time || "未入力")}</p>
          </section>
          <section class="detail-section">
            <h3>分量</h3>
            <p>${escapeHtml(recipe.servings || "未入力")}</p>
          </section>
          <section class="detail-section full">
            <h3>メモ</h3>
            <p>${escapeHtml(recipe.memo || "未入力")}</p>
          </section>
        </div>
        <div class="form-actions">
          <button class="btn secondary" type="button" id="detailEditButton">
            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            編集
          </button>
          <button class="btn danger" type="button" id="detailDeleteButton">
            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="m19 6-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            削除
          </button>
        </div>
      `;
      showView("detail");
    }

    function titleFromText(text) {
      const lines = normalizeText(text)
        .split("\n")
        .map((line) => line.replace(/[【】■□●○]/g, "").trim())
        .filter(Boolean);
      const skip = /^(材料|作り方|手順|memo|メモ|調理時間|分量|ingredients?|recipe)$/i;
      const candidate = lines.find((line) => line.length >= 3 && line.length <= 32 && !skip.test(line));
      return candidate || lines[0] || "無題のレシピ";
    }

    function guessCategory(text) {
      if (/ケーキ|クッキー|砂糖|デザート|お菓子|プリン/.test(text)) return "お菓子";
      if (/スープ|汁|味噌汁|みそ汁/.test(text)) return "汁物";
      if (/ご飯|丼|麺|パスタ|うどん|そば|ラーメン/.test(text)) return "ご飯・麺";
      if (/弁当|おにぎり/.test(text)) return "お弁当";
      if (/サラダ|和え|副菜/.test(text)) return "副菜";
      return "主菜";
    }

    function parseOcrText(text) {
      const cleaned = normalizeText(text);
      const lines = cleaned.split("\n").map((line) => line.trim()).filter(Boolean);
      const ingredients = [];
      const steps = [];
      let mode = "";
      let time = "";
      let servings = "";

      lines.forEach((line) => {
        if (/材料|ingredients?/i.test(line)) {
          mode = "ingredients";
          return;
        }
        if (/作り方|手順|つくり方|how to/i.test(line)) {
          mode = "steps";
          return;
        }
        if (!time) {
          const match = line.match(/(?:調理時間|所要時間)?\s*([0-9０-９]+)\s*(分|時間)/);
          if (match) time = `${match[1]}${match[2]}`;
        }
        if (!servings) {
          const match = line.match(/([0-9０-９]+)\s*(人分|個分|本分|皿分|枚分)/);
          if (match) servings = `${match[1]}${match[2]}`;
        }
        if (mode === "ingredients") {
          ingredients.push(line);
        } else if (mode === "steps" || /^[0-9０-９]+[.)．、]/.test(line)) {
          mode = "steps";
          steps.push(line);
        }
      });

      const title = titleFromText(cleaned);
      return {
        title,
        category: guessCategory(cleaned),
        ingredients: ingredients.join("\n"),
        steps: steps.join("\n"),
        time,
        servings,
        memo: cleaned ? `OCR抽出結果を確認済み\n\n${cleaned}` : ""
      };
    }

    async function runOcr() {
      if (!selectedImageFile) return;
      if (!window.Tesseract) {
        ocrStatus.innerHTML = "<strong>OCRライブラリを読み込めませんでした。</strong> インターネット接続を確認してください。";
        return;
      }

      ocrButton.disabled = true;
      ocrStatus.innerHTML = "<strong>OCR実行中...</strong> 画像は保存せず、この処理にだけ使います。";

      try {
        const result = await Tesseract.recognize(selectedImageFile, "jpn+eng", {
          logger: (progress) => {
            if (progress.status === "recognizing text") {
              const percent = Math.round(progress.progress * 100);
              ocrStatus.innerHTML = `<strong>OCR実行中...</strong> ${percent}%`;
            }
          }
        });
        const text = normalizeText(result.data.text);
        const parsed = parseOcrText(text);
        fields.title.value = parsed.title;
        fields.category.value = parsed.category;
        fields.ingredients.value = parsed.ingredients;
        fields.steps.value = parsed.steps;
        fields.time.value = parsed.time;
        fields.servings.value = parsed.servings;
        fields.memo.value = parsed.memo;
        rawPreview.textContent = text || "テキストを読み取れませんでした。手入力で保存できます。";
        rawPreview.classList.remove("hidden");
        ocrStatus.innerHTML = "<strong>OCR完了。</strong> 保存前に各項目を確認してください。";
      } catch (error) {
        ocrStatus.innerHTML = "<strong>OCRに失敗しました。</strong> 画像を変えるか、手入力で登録してください。";
      } finally {
        selectedImageFile = null;
        imageInput.value = "";
        ocrButton.disabled = true;
      }
    }

    function collectFormData() {
      const now = todayIso();
      const existing = recipes.find((recipe) => recipe.id === editingId);
      return {
        id: editingId || crypto.randomUUID(),
        title: normalizeText(fields.title.value) || "無題のレシピ",
        category: fields.category.value || "その他",
        ingredients: normalizeText(fields.ingredients.value),
        steps: normalizeText(fields.steps.value),
        time: normalizeText(fields.time.value),
        servings: normalizeText(fields.servings.value),
        memo: normalizeText(fields.memo.value),
        createdAt: existing?.createdAt || now,
        updatedAt: now
      };
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1900);
    }

    document.getElementById("homeButton").addEventListener("click", () => {
      renderHome();
      showView("home");
    });

    document.getElementById("newRecipeButton").addEventListener("click", openNewRecipe);
    document.getElementById("backFromEditButton").addEventListener("click", () => {
      if (editingId) openDetail(editingId);
      else showView("home");
    });
    document.getElementById("cancelEditButton").addEventListener("click", () => {
      if (editingId) openDetail(editingId);
      else showView("home");
    });
    document.getElementById("backFromDetailButton").addEventListener("click", () => {
      renderHome();
      showView("home");
    });

    imageInput.addEventListener("change", () => {
      selectedImageFile = imageInput.files?.[0] || null;
      ocrButton.disabled = !selectedImageFile;
      ocrStatus.textContent = selectedImageFile ? "画像を選択しました。OCR実行でテキスト化します。" : "";
      rawPreview.classList.add("hidden");
      rawPreview.textContent = "";
    });

    ocrButton.addEventListener("click", runOcr);
    searchInput.addEventListener("input", renderHome);

    recipeList.addEventListener("click", (event) => {
      const card = event.target.closest(".recipe-card");
      if (card) openDetail(card.dataset.id);
    });

    detailContent.addEventListener("click", (event) => {
      if (event.target.closest("#detailEditButton")) {
        openEditRecipe(currentDetailId);
      }
      if (event.target.closest("#detailDeleteButton")) {
        const recipe = recipes.find((item) => item.id === currentDetailId);
        if (recipe && confirm(`「${recipe.title}」を削除しますか？`)) {
          recipes = recipes.filter((item) => item.id !== currentDetailId);
          saveRecipes();
          currentDetailId = null;
          renderHome();
          showView("home");
          showToast("削除しました");
        }
      }
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const recipe = collectFormData();
      const index = recipes.findIndex((item) => item.id === recipe.id);
      if (index >= 0) recipes[index] = recipe;
      else recipes.push(recipe);
      saveRecipes();
      renderHome();
      openDetail(recipe.id);
      showToast("保存しました");
    });

    renderHome();
  </script>
</body>
</html>
